<!DOCTYPE html>
<html lang="ar" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>تسجيل الدخول - نظام المغسلة</title>
  <link rel="stylesheet" href="../../assets/tailwind.css" />
  <link rel="stylesheet" href="login.css" />
  <link rel="stylesheet" href="../../assets/screen-mobile-compact.css" />
</head>
<body class="login-page" data-page-title="page-title-login">

  <div class="login-shell">
    <div class="login-scroll">
      <div class="window-bg">

        <div class="panel-shadow">
          <div class="panel-bg"></div>
          <div class="login-panel">

            <!-- ── إشعار التحديث (أعلى يمين الشاشة) ── -->
            <div id="updateBadge" title="تحديث متاح" style="display:none;position:fixed;top:18px;right:18px;z-index:9999;width:44px;height:44px;border-radius:50%;background:#2563eb;box-shadow:0 4px 16px rgba(37,99,235,.45);align-items:center;justify-content:center;cursor:pointer;transition:opacity .4s,transform .4s">
              <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" width="22" height="22"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </div>

            <!-- ── شاشة تسجيل الدخول ── -->
            <div class="form-area" id="formArea" dir="rtl">
              <div class="login-brand">
                <div class="login-brand-icon">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path d="M3 6h18M3 6l1.5 12h15L21 6M3 6l2-3h14l2 3"/>
                    <path d="M9 11c0 1.657 1.343 3 3 3s3-1.343 3-3"/>
                  </svg>
                </div>
                <span class="login-brand-label">نظام إدارة المغسلة</span>
              </div>
              <h1 class="login-title" data-i18n="login-heading">تسجيل الدخول</h1>

              <!-- badge الدعم الفني -->
              <div id="supportBadge" class="support-badge" style="display:none"></div>

              <!-- badge الأيام المتبقية -->
              <div id="trialBadge" class="trial-badge" style="display:none"></div>

              <div id="errorMsg" class="error-msg" style="display:none"></div>

              <div class="field-group" id="usernameGroup">
                <label class="field-label" data-i18n="label-username">اسم المستخدم</label>
                <div class="field-wrap">
                  <input id="username" type="text" autocomplete="off"
                         placeholder="أدخل اسم المستخدم" class="field-input"
                         data-i18n-placeholder="placeholder-username" />
                  <button id="userDropdownToggle" class="user-dropdown-toggle" tabindex="-1" type="button"
                          style="display:none" aria-label="المستخدمون المحفوظون">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                      <polyline points="6 9 12 15 18 9"/>
                    </svg>
                  </button>
                  <button id="userDeleteBtn" class="user-delete-btn" tabindex="-1" type="button"
                          style="display:none" aria-label="حذف المستخدم المحفوظ" title="حذف المستخدم المحفوظ">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <polyline points="3 6 5 6 21 6"/>
                      <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                      <path d="M10 11v6M14 11v6"/>
                      <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    </svg>
                  </button>
                  <span class="field-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                      <circle cx="12" cy="7" r="4"/>
                    </svg>
                  </span>
                </div>
                <!-- قائمة المستخدمين المحفوظين -->
                <div id="savedUsersDropdown" class="user-dropdown" style="display:none"></div>
              </div>

              <div class="field-group">
                <label class="field-label" data-i18n="label-password">كلمة المرور</label>
                <div class="field-wrap">
                  <input id="password" type="password" autocomplete="off"
                         placeholder="أدخل كلمة المرور" class="field-input"
                         data-i18n-placeholder="placeholder-password" />
                  <button id="togglePassword" class="toggle-pass-btn" tabindex="-1" type="button">
                    <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                      <circle cx="12" cy="12" r="3"/>
                    </svg>
                    <svg id="eyeOffIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                      <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                      <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                      <line x1="1" y1="1" x2="23" y2="23"/>
                    </svg>
                  </button>
                </div>
              </div>

              <div class="remember-row">
                <label class="checkbox-label">
                  <input type="checkbox" id="rememberMe" />
                  <span class="checkmark"></span>
                  <span data-i18n="remember-me">تذكرني</span>
                </label>
              </div>

              <button type="button" id="btnLogin" class="btn-login" data-i18n="btn-login">دخول</button>

              <!-- زر التجربة المجانية -->
              <div id="trialCta" class="trial-cta" style="display:none">
                <div class="trial-cta-divider"><span>أو</span></div>
                <button type="button" id="btnShowRegister" class="btn-trial">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
                    <path d="M12 6v6l4 2"/>
                  </svg>
                  ابدأ تجربتك المجانية — 7 أيام مجاناً
                </button>
              </div>
            </div>

            <!-- ── شاشة انتهاء التجربة ── -->
            <div class="form-area expired-form-area" id="expiredArea" dir="rtl" style="display:none">
              <div class="expired-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <circle cx="12" cy="12" r="10"/>
                  <path d="M12 6v6l4 2"/>
                </svg>
              </div>
              <h1 class="expired-title">انتهت فترة التجربة</h1>
              <p class="expired-text">
                شكراً لتجربتك النظام.<br/>
                تواصل مع أقرب فرع للاشتراك.
              </p>

              <div class="branch-cards">
                <a href="https://wa.me/966548930305" target="_blank" class="branch-card">
                  <div class="branch-card-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
                      <path d="M12 0C5.373 0 0 5.373 0 12c0 2.138.564 4.14 1.544 5.874L.057 23.428a.75.75 0 0 0 .921.921l5.554-1.487A11.953 11.953 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.896 0-3.671-.516-5.192-1.413l-.372-.22-3.853 1.031 1.031-3.853-.22-.372A9.944 9.944 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/>
                    </svg>
                  </div>
                  <div class="branch-card-info">
                    <span class="branch-card-name">فرع الرياض</span>
                    <span class="branch-card-phone" dir="ltr">0548930305</span>
                  </div>
                  <div class="branch-card-arrow">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                      <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                  </div>
                </a>

                <a href="https://wa.me/966548147704" target="_blank" class="branch-card">
                  <div class="branch-card-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
                      <path d="M12 0C5.373 0 0 5.373 0 12c0 2.138.564 4.14 1.544 5.874L.057 23.428a.75.75 0 0 0 .921.921l5.554-1.487A11.953 11.953 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.896 0-3.671-.516-5.192-1.413l-.372-.22-3.853 1.031 1.031-3.853-.22-.372A9.944 9.944 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/>
                    </svg>
                  </div>
                  <div class="branch-card-info">
                    <span class="branch-card-name">فرع الشرقية</span>
                    <span class="branch-card-phone" dir="ltr">0548147704</span>
                  </div>
                  <div class="branch-card-arrow">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                      <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                  </div>
                </a>

                <a href="https://wa.me/966569941714" target="_blank" class="branch-card">
                  <div class="branch-card-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
                      <path d="M12 0C5.373 0 0 5.373 0 12c0 2.138.564 4.14 1.544 5.874L.057 23.428a.75.75 0 0 0 .921.921l5.554-1.487A11.953 11.953 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.896 0-3.671-.516-5.192-1.413l-.372-.22-3.853 1.031 1.031-3.853-.22-.372A9.944 9.944 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/>
                    </svg>
                  </div>
                  <div class="branch-card-info">
                    <span class="branch-card-name">فرع جدة</span>
                    <span class="branch-card-phone" dir="ltr">0569941714</span>
                  </div>
                  <div class="branch-card-arrow">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                      <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                  </div>
                </a>
              </div>

              <div class="expired-actions">
                <button type="button" id="btnBackFromExpired" class="btn-login btn-back-expired">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:17px;height:17px">
                    <path d="M19 12H5M5 12l7 7M5 12l7-7"/>
                  </svg>
                  العودة لتسجيل الدخول
                </button>
              </div>
            </div>

          </div>
        </div>

        <div class="welcome-panel" id="welcomePanel">
          <img
            src="../../assets/icon/Gemini_Generated_Image_wh6zddwh6zddwh6z.png"
            alt="نظام إدارة المغسلة"
            class="welcome-img"
          />
        </div>


      </div>
    </div>
  </div>

  <!-- ── Modal التسجيل ── -->
  <div id="registerModal" class="modal-overlay" style="display:none" role="dialog" aria-modal="true">
    <div class="modal-box" dir="rtl">

      <div class="modal-header">
        <div class="modal-header-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
            <path d="M12 6v6l4 2"/>
          </svg>
        </div>
        <div>
          <h2 class="modal-title">ابدأ تجربتك المجانية</h2>
          <p class="modal-subtitle">7 أيام مجاناً — بدون بطاقة ائتمانية</p>
        </div>
        <button type="button" id="btnCloseModal" class="modal-close" aria-label="إغلاق">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <div id="registerErrorMsg" class="error-msg" style="display:none; margin-bottom:16px"></div>
      <div id="registerSuccessMsg" class="success-msg" style="display:none; margin-bottom:16px"></div>

      <div class="modal-fields">
        <div class="modal-field-group">
          <label class="modal-label">اسم المغسلة / صاحب المغسلة</label>
          <div class="modal-field-wrap">
            <span class="modal-field-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
              </svg>
            </span>
            <input id="regName" type="text" autocomplete="off" placeholder="مغسلة النقاء" class="modal-input" />
          </div>
        </div>

        <div class="modal-field-group">
          <label class="modal-label">رقم الجوال</label>
          <div class="modal-field-wrap">
            <span class="modal-field-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.5 2 2 0 0 1 3.59 1.32h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.84a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
              </svg>
            </span>
            <input id="regPhone" type="tel" autocomplete="off" placeholder="05XXXXXXXX" class="modal-input" dir="ltr" style="text-align:right" />
          </div>
        </div>

        <div class="modal-field-group">
          <label class="modal-label">كلمة المرور</label>
          <div class="modal-field-wrap">
            <span class="modal-field-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input id="regPassword" type="password" autocomplete="off" placeholder="6 أحرف على الأقل" class="modal-input" />
          </div>
        </div>
      </div>

      <button type="button" id="btnRegister" class="btn-login" style="margin-top:8px">
        إنشاء الحساب وبدء التجربة
      </button>

      <p class="modal-terms">بالتسجيل أنت توافق على شروط الاستخدام والسياسة الخاصة بالنظام</p>
    </div>
  </div>

  <script src="../../assets/web-api.js"></script>
  <script src="../../assets/i18n.js"></script>
  <script src="login.js"></script>
</body>
</html>
