.toolbar-actions{width:100%;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;align-items:stretch;min-width:0}
.toolbar-actions .btn-export{width:auto!important;max-width:none!important;min-width:0;justify-content:center;box-sizing:border-box;padding:8px 14px;font-size:13px}
.toolbar-actions .btn-export svg{width:15px;height:15px}
.toolbar-actions .btn-primary{grid-column:1/-1;width:100%!important;max-width:100%;min-width:0;justify-content:center;box-sizing:border-box;flex-shrink:0}
.header-right{flex:1;min-width:0}
.header-title{font-size:14px;max-width:min(220px,52vw);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.form-grid{grid-template-columns:1fr!important}
.modal-body,.modal-header,.modal-footer{padding-left:16px!important;padding-right:16px!important}
.confirm-footer{flex-direction:column-reverse!important;width:100%}
.confirm-footer .btn-cancel,.confirm-footer .btn-danger{width:100%}
.pagination-bar{flex-direction:column;align-items:stretch;gap:12px}
.pagination-info{white-space:normal;text-align:center}
.pagination-controls{justify-content:center;flex-wrap:wrap}
.page-size-selector{justify-content:center;flex-wrap:wrap;width:100%}
}
@media(max-width:480px){
.page-wrapper .header-bar{min-height:44px;padding-top:max(6px,env(safe-area-inset-top,0));padding-bottom:6px;padding-left:max(8px,env(safe-area-inset-left,0));padding-right:max(8px,env(safe-area-inset-right,0));gap:6px}
.header-right{gap:12px}
.header-logo{gap:8px}
.logo-icon{width:28px;height:28px}
.logo-icon svg{width:15px;height:15px}
.header-title{font-size:13px!important;max-width:min(160px,48vw)!important}
.back-btn{padding:6px 12px 6px 10px;font-size:12px;gap:5px;border-radius:40px}
.back-btn svg{width:14px;height:14px}
.main-content{padding:max(8px,env(safe-area-inset-top,0)) max(8px,env(safe-area-inset-right,0)) max(24px,env(safe-area-inset-bottom,0)) max(8px,env(safe-area-inset-left,0));gap:10px;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-y:auto}
.search-wrap{padding:0 10px;border-radius:8px;border-width:1px;gap:8px}
.search-icon svg{width:15px;height:15px}
.search-input{padding:7px 0;font-size:13px}
.toolbar{gap:8px}
.toolbar-actions{gap:6px}
.toolbar-actions .btn-export{padding:7px 10px;font-size:12px;min-height:36px}
.toolbar-actions .btn-export svg{width:14px;height:14px}
.toolbar-actions .btn-primary{padding:8px 14px;font-size:12px;gap:6px}
.toolbar-actions .btn-primary svg{width:15px;height:15px}
.table-container{border-radius:10px}
.customers-table thead th{padding:8px 10px;font-size:11px}
.customers-table tbody td{padding:8px 10px;font-size:12px}
.badge-type,.badge-status{font-size:11px;padding:2px 8px}
.sub-number{font-size:11px}
.customers-table th:last-child,.customers-table td:last-child{min-width:160px}
.subs-actions .action-btn-label{padding:4px 8px;font-size:10px;min-height:24px}
.action-btn-label{padding:6px 10px;font-size:11px;min-height:32px}
.action-btn-label svg{width:13px;height:13px}
.empty-state{padding:32px 16px;gap:10px}
.empty-state svg{width:44px;height:44px}
.empty-state p{font-size:13px}
.pagination-bar{padding:8px 2px;gap:8px}
.pagination-info{font-size:12px}
.page-btn,.page-num{min-width:30px;height:30px;font-size:12px}
.page-ellipsis{height:30px;font-size:12px}
.page-size-selector{font-size:12px;gap:6px}
.page-size-selector select{padding:5px 8px;font-size:12px}
.loading-cell{padding:28px!important;font-size:13px}
}
  </style>
  <link rel="stylesheet" href="../../assets/screen-mobile-compact.css" />
</head>
<body data-page-title="page-title-customers">

  <div class="page-wrapper">

    <header class="header-bar" id="dragRegion">
      <div class="header-right">
        <div class="header-logo">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <span class="header-title" data-i18n="customers-header-title">إدارة العملاء</span>
        </div>
      </div>
      <div class="header-left">
        <button class="back-btn" id="btnBack">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          <span data-i18n="customers-back">العودة</span>
        </button>
      </div>
    </header>

    <main class="main-content">

      <div class="toolbar">
        <div class="search-wrap">
          <span class="search-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </span>
          <input id="searchInput" type="text" class="search-input"
            data-i18n-placeholder="customers-search-placeholder"
            placeholder="بحث بالاسم أو رقم الجوال..." autocomplete="off" />
        </div>
        <div class="toolbar-actions">
          <button id="btnExportExcel" class="btn-export btn-excel">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
            </svg>
            <span data-i18n="customers-export-excel">Excel</span>
          </button>
          <button id="btnExportPdf" class="btn-export btn-pdf">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="9" y1="15" x2="15" y2="15"/>
            </svg>
            <span data-i18n="customers-export-pdf">PDF</span>
          </button>
          <button id="btnAddCustomer" class="btn-primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            <span data-i18n="customers-btn-add">إضافة عميل</span>
          </button>
        </div>
      </div>

      <div class="table-container">
        <table class="customers-table">
          <thead>
            <tr>
              <th class="col-index">#</th>
              <th data-i18n="customers-col-sub">رقم الاشتراك</th>
              <th data-i18n="customers-col-name">اسم العميل</th>
              <th data-i18n="customers-col-phone">رقم الجوال</th>
              <th data-i18n="customers-col-type">النوع</th>
              <th data-i18n="customers-col-city">المدينة</th>
              <th data-i18n="customers-col-status">الحالة</th>
              <th data-i18n="customers-col-actions">الإجراءات</th>
            </tr>
          </thead>
          <tbody id="customersTableBody">
            <tr id="loadingRow">
              <td colspan="8" class="loading-cell">
                <div class="spinner"></div>
                <span data-i18n="customers-loading">جارٍ التحميل...</span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div id="emptyState" class="empty-state" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <p data-i18n="customers-empty">لا يوجد عملاء</p>
      </div>

      <!-- Pagination Bar -->
      <div class="pagination-bar" id="paginationBar" style="display:none">
        <div class="pagination-info">
          <span id="paginationInfo"></span>
        </div>
        <div class="pagination-controls">
          <button id="btnFirstPage" class="page-btn" title="أول صفحة">«</button>
          <button id="btnPrevPage"  class="page-btn" title="السابق">‹</button>
          <div id="pageNumbers" class="page-numbers"></div>
          <button id="btnNextPage"  class="page-btn" title="التالي">›</button>
          <button id="btnLastPage"  class="page-btn" title="آخر صفحة">»</button>
        </div>
        <div class="page-size-selector">
          <span>عرض</span>
          <select id="pageSizeSelect">
            <option value="25">25</option>
            <option value="50" selected>50</option>
            <option value="100">100</option>
            <option value="200">200</option>
          </select>
          <span>في الصفحة</span>
        </div>
      </div>

    </main>

  </div>

  <!-- Add / Edit Modal -->
  <div id="modalOverlay" class="modal-overlay" style="display:none">
    <div class="modal-box modal-wide">
      <div class="modal-header">
        <h2 id="modalTitle" class="modal-title" data-i18n="customers-modal-add-title">إضافة عميل جديد</h2>
        <button class="modal-close-btn" id="btnModalClose">✕</button>
      </div>

      <div id="modalError" class="error-msg" style="display:none"></div>

      <div class="modal-body">
        <input type="hidden" id="editCustomerId" />

        <div class="form-grid">

          <div class="field-group">
            <label class="field-label" data-i18n="customers-label-sub">رقم الاشتراك</label>
            <div class="field-wrap">
              <input id="inputSubNumber" type="text" class="field-input field-readonly"
                readonly
                data-i18n-placeholder="customers-placeholder-sub"
                placeholder="يُولَّد تلقائياً" />
            </div>
          </div>

          <div class="field-group">
            <label class="field-label">
              <span data-i18n="customers-label-name">اسم العميل</span>
            </label>
            <div class="field-wrap">
              <input id="inputCustomerName" type="text" class="field-input"
                data-i18n-placeholder="customers-placeholder-name"
                placeholder="أدخل اسم العميل" autocomplete="off" />
            </div>
          </div>

          <div class="field-group">
            <label class="field-label">
              <span data-i18n="customers-label-phone">رقم الجوال</span>
              <span class="required-star"> *</span>
            </label>
            <div class="field-wrap">
              <input id="inputPhone" type="text" class="field-input" inputmode="numeric" lang="en" dir="ltr"
                data-i18n-placeholder="customers-placeholder-phone"
                placeholder="" maxlength="32" autocomplete="off" />
            </div>
          </div>

          <div class="field-group">
            <label class="field-label">
              <span data-i18n="customers-label-city">المدينة</span>
            </label>
            <div class="field-wrap">
              <input id="inputCity" type="text" class="field-input"
                data-i18n-placeholder="customers-placeholder-city"
                placeholder="أدخل المدينة" autocomplete="off" />
            </div>
          </div>

          <div class="field-group field-group-full">
            <label class="field-label">
              <span data-i18n="customers-label-address">العنوان</span>
            </label>
            <div class="field-wrap">
              <input id="inputAddress" type="text" class="field-input"
                data-i18n-placeholder="customers-placeholder-address"
                placeholder="أدخل العنوان التفصيلي" autocomplete="off" />
            </div>
          </div>

          <div class="field-group">
            <label class="field-label" data-i18n="customers-label-type">نوع العميل</label>
            <div class="select-wrap">
              <select id="inputCustomerType" class="field-select">
                <option value="individual" data-i18n="customers-type-individual">فرد</option>
                <option value="corporate" data-i18n="customers-type-corporate">شركة</option>
              </select>
              <span class="select-arrow">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                  <polyline points="6 9 12 15 18 9"/>
                </svg>
              </span>
            </div>
          </div>

          <div class="field-group">
            <label class="field-label" data-i18n="customers-label-national-id">رقم الهوية / الإقامة</label>
            <div class="field-wrap">
              <input id="inputNationalId" type="text" class="field-input"
                data-i18n-placeholder="customers-placeholder-national-id"
                placeholder="أدخل رقم الهوية أو الإقامة" maxlength="10" autocomplete="off" />
            </div>
          </div>

          <div class="field-group">
            <label class="field-label" data-i18n="customers-label-tax">الرقم الضريبي</label>
            <div class="field-wrap">
              <input id="inputTaxNumber" type="text" class="field-input"
                data-i18n-placeholder="customers-placeholder-tax"
                placeholder="أدخل الرقم الضريبي (اختياري)" maxlength="15" autocomplete="off" />
            </div>
          </div>

          <div class="field-group">
            <label class="field-label" data-i18n="customers-label-email">البريد الإلكتروني</label>
            <div class="field-wrap">
              <input id="inputEmail" type="email" class="field-input"
                data-i18n-placeholder="customers-placeholder-email"
                placeholder="example@email.com" autocomplete="off" />
            </div>
          </div>

          <div class="field-group">
            <label class="field-label" data-i18n="customers-label-status">الحالة</label>
            <div class="toggle-wrap">
              <label class="toggle-switch">
                <input type="checkbox" id="inputIsActive" checked />
                <span class="toggle-slider"></span>
              </label>
              <span id="statusLabel" class="toggle-label" data-i18n="customers-status-active">نشط</span>
            </div>
          </div>

          <div class="field-group field-group-full">
            <label class="field-label" data-i18n="customers-label-notes">ملاحظات</label>
            <div class="field-wrap">
              <textarea id="inputNotes" class="field-input field-textarea" rows="3"
                data-i18n-placeholder="customers-placeholder-notes"
                placeholder="ملاحظات إضافية (اختياري)"></textarea>
            </div>
          </div>

        </div>
      </div>

      <div class="modal-footer">
        <button id="btnModalCancel" class="btn-cancel" data-i18n="customers-btn-cancel">إلغاء</button>
        <button id="btnModalSave" class="btn-primary" data-i18n="customers-btn-save">حفظ</button>
      </div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <!-- Confirm Delete Dialog -->
  <div id="confirmOverlay" class="confirm-overlay" style="display:none">
    <div class="confirm-box">
      <div class="confirm-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </div>
      <h3 class="confirm-title" data-i18n="customers-confirm-title">تأكيد الحذف</h3>
      <p class="confirm-msg" id="confirmMsg"></p>
      <div class="confirm-footer">
        <button id="btnConfirmCancel" class="btn-cancel" data-i18n="customers-btn-cancel">إلغاء</button>
        <button id="btnConfirmOk" class="btn-danger" data-i18n="customers-btn-delete">حذف</button>
      </div>
    </div>
  </div>

  <script src="../../assets/web-api.js"></script>
  <script src="../../assets/auth-guard.js"></script>
  <script src="../../assets/i18n.js"></script>
  <script src="customers.js"></script>
</body>
</html>
