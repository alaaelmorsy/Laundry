<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>العروض والتخفيضات</title>
  <link rel="stylesheet" href="../../assets/tailwind.css" />
  <link rel="stylesheet" href="offers.css" />
  <link rel="stylesheet" href="../../assets/screen-mobile-compact.css" />
</head>
<body data-page-title="page-title-offers">

<div class="pw">

  <!-- ══════════ HEADER ══════════ -->
  <header class="hdr" id="dragRegion">
    <div class="hdr-r">
      <div class="h-logo">
        <div class="h-ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
            <line x1="7" y1="7" x2="7.01" y2="7"/>
          </svg>
        </div>
        <span class="h-tit" data-i18n="offers-heading">العروض والتخفيضات</span>
      </div>
    </div>
    <div class="hdr-l">
      <button type="button" class="btn-add" id="btnAddOffer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        <span data-i18n="offers-btn-add">إنشاء عرض جديد</span>
      </button>
      <button type="button" class="back-btn" id="btnBack">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        <span data-i18n="offers-btn-back">العودة</span>
      </button>
    </div>
  </header>

  <!-- ══════════ BODY ══════════ -->
  <div class="s-body">


    <!-- ── Filter Bar ── -->
    <div class="filter-bar">
      <div class="filter-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="بحث في العروض..." autocomplete="off" data-i18n-placeholder="offers-search-placeholder" />
      </div>
      <div class="filter-group">
        <select id="filterStatus" class="filter-select">
          <option value="all" data-i18n="offers-filter-all">جميع الحالات</option>
          <option value="active" data-i18n="offers-filter-active">نشط</option>
          <option value="scheduled" data-i18n="offers-filter-scheduled">مجدول</option>
          <option value="expired" data-i18n="offers-filter-expired">منتهي</option>
          <option value="disabled" data-i18n="offers-filter-disabled">معطل</option>
        </select>
      </div>
    </div>

    <!-- ── Table ── -->
    <div class="table-wrap">
      <table class="offers-table" id="offersTable">
        <thead>
          <tr>
            <th data-i18n="offers-th-name">اسم العرض</th>
            <th data-i18n="offers-th-type">نوع الخصم</th>
            <th data-i18n="offers-th-value">القيمة</th>
            <th data-i18n="offers-th-from">من</th>
            <th data-i18n="offers-th-to">إلى</th>
            <th data-i18n="offers-th-status">الحالة</th>
            <th data-i18n="offers-th-actions">الإجراءات</th>
          </tr>
        </thead>
        <tbody id="offersBody">
        </tbody>
      </table>
      <div class="empty-state" id="emptyState" style="display:none">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
            <line x1="7" y1="7" x2="7.01" y2="7"/>
          </svg>
        </div>
        <h3 data-i18n="offers-empty-title">لا توجد عروض</h3>
        <p data-i18n="offers-empty-desc">اضغط على "إنشاء عرض جديد" لإضافة أول عرض</p>
      </div>
    </div>
  </div>
</div>

<!-- ══════════ MODAL ══════════ -->
<div class="modal-overlay" id="offerModal" style="display:none">
  <div class="modal-box">
    <div class="modal-hdr">
      <div class="modal-hdr-r">
        <div class="modal-ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
            <line x1="7" y1="7" x2="7.01" y2="7"/>
          </svg>
        </div>
        <span class="modal-title" id="modalTitle" data-i18n="offers-modal-create">إنشاء عرض جديد</span>
      </div>
      <button type="button" class="modal-close" id="btnCloseModal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <form id="offerForm" autocomplete="off" lang="en">
        <input type="hidden" id="offerId" />
        <div class="form-grid">
          <div class="fld f-full">
            <label class="flbl"><span data-i18n="offers-label-name">اسم العرض</span> <span class="req">*</span></label>
            <div class="fwrap"><input type="text" class="finp" id="offerName" placeholder="مثال: عرض نهاية الأسبوع" required data-i18n-placeholder="offers-placeholder-name" /></div>
          </div>

          <div class="fld">
            <label class="flbl"><span data-i18n="offers-label-type">نوع الخصم</span> <span class="req">*</span></label>
            <div class="discount-type-toggle" id="discountTypeToggle">
              <button type="button" class="dt-btn active" data-type="percentage">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>
                <span data-i18n="offers-type-pct">نسبة مئوية</span> %
              </button>
              <button type="button" class="dt-btn" data-type="fixed">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                <span data-i18n="offers-type-fixed">مبلغ ثابت</span>
              </button>
            </div>
          </div>

          <div class="fld">
            <label class="flbl"><span data-i18n="offers-label-value">قيمة الخصم</span> <span class="req">*</span></label>
            <div class="fwrap val-wrap">
              <input type="number" class="finp" id="discountValue" min="0" step="0.01" dir="ltr" style="text-align:left" placeholder="0" required />
              <span class="val-suffix" id="valSuffix">%</span>
            </div>
          </div>

          <div class="fld">
            <label class="flbl"><span data-i18n="offers-label-start">تاريخ ووقت البداية</span> <span class="req">*</span></label>
            <div class="fwrap"><input type="datetime-local" class="finp" id="startDate" lang="en" dir="ltr" style="text-align:left" required /></div>
          </div>

          <div class="fld">
            <label class="flbl"><span data-i18n="offers-label-end">تاريخ ووقت النهاية</span> <span class="req">*</span></label>
            <div class="fwrap"><input type="datetime-local" class="finp" id="endDate" lang="en" dir="ltr" style="text-align:left" required /></div>
          </div>

          <div class="fld f-full">
            <label class="flbl" data-i18n="offers-label-desc">وصف العرض</label>
            <div class="fwrap"><textarea class="finp ftxt" id="offerDescription" rows="2" placeholder="وصف اختياري يظهر في الفاتورة..." data-i18n-placeholder="offers-placeholder-desc"></textarea></div>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn-cancel" id="btnCancel" data-i18n="offers-btn-cancel">إلغاء</button>
      <button type="button" class="btn-save" id="btnSaveOffer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        <span id="btnSaveLabel" data-i18n="offers-btn-save">حفظ العرض</span>
      </button>
    </div>
  </div>
</div>

<!-- ══════════ CONFIRM MODAL ══════════ -->
<div class="modal-overlay" id="confirmModal" style="display:none">
  <div class="confirm-box">
    <div class="confirm-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
    </div>
    <h3 class="confirm-title" data-i18n="offers-confirm-title">تأكيد الحذف</h3>
    <p class="confirm-msg" id="confirmMsg">هل تريد حذف هذا العرض نهائياً؟</p>
    <div class="confirm-btns">
      <button type="button" class="btn-cancel" id="btnConfirmCancel" data-i18n="offers-btn-cancel">إلغاء</button>
      <button type="button" class="btn-confirm-delete" id="btnConfirmDelete" data-i18n="offers-btn-delete">حذف</button>
    </div>
  </div>
</div>

<!-- ══════════ TOAST ══════════ -->
<div class="toast-container" id="toastContainer"></div>

<script src="../../assets/web-api.js"></script>
<script src="../../assets/auth-guard.js"></script>
<script src="../../assets/i18n.js"></script>
<script src="offers.js"></script>
</body>
</html>
