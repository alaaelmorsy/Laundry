<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>الأسعار المخصصة - نظام المغسلة</title>
  <link rel="stylesheet" href="../../assets/tailwind.css" />
  <link rel="stylesheet" href="customer-custom-prices.css" />
  <link rel="stylesheet" href="../../assets/sidebar.css" />
</head>
<body>

  <div class="page-wrapper">

    <!-- Header -->
    <div class="header-bar">
      <div class="header-right">
        <span class="header-title" data-i18n="ccp-title">الأسعار المخصصة</span>
      </div>
      <div class="header-center">
        <div class="customer-autocomplete-wrap" id="customerAutoWrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" class="select-icon"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input type="text" id="customerSearchInput" class="customer-search-input" placeholder="اختر العميل..." autocomplete="off" />
          <button class="customer-clear-btn" id="customerClearBtn" style="display:none" title="مسح">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
          <ul class="customer-suggestions" id="customerSuggestions" style="display:none"></ul>
        </div>
      </div>
      <div class="header-left">
        <button id="btnSave" class="save-btn" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          <span data-i18n="ccp-save">حفظ التغييرات</span>
        </button>
        <button class="back-btn" id="btnBack">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="9 18 15 12 9 6"/></svg>
          <span data-i18n="gsb-back">رجوع</span>
        </button>
      </div>
    </div>

    <!-- Summary Cards -->
    <div class="summary-bar" id="summaryBar" style="display:none">
      <div class="summary-card">
        <div class="summary-value" id="sumTotal">0</div>
        <div class="summary-label" data-i18n="ccp-total-services">إجمالي الخدمات</div>
      </div>
      <div class="summary-card accent">
        <div class="summary-value" id="sumCustom">0</div>
        <div class="summary-label" data-i18n="ccp-custom-services">خدمات مخصصة</div>
      </div>
      <div class="summary-card">
        <div class="summary-value" id="sumAvg">—</div>
        <div class="summary-label" data-i18n="ccp-avg-diff">متوسط الفرق</div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="content-area">

      <!-- Empty State: no customer selected -->
      <div class="empty-state" id="stateNoCustomer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="56" height="56"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <p data-i18n="ccp-select-customer">اختر العميل لعرض الأسعار المخصصة</p>
      </div>

      <!-- Split layout (shown after customer selected) -->
      <div class="split-layout" id="splitLayout" style="display:none">

        <!-- Master Panel: Product List -->
        <div class="master-panel">
          <div class="panel-header">
            <div class="search-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input type="text" id="searchInput" class="search-input" placeholder="بحث عن صنف..." data-i18n-placeholder="ccp-search-products" />
            </div>
          </div>
          <div class="product-list" id="productList">
            <!-- Populated by JS -->
          </div>
        </div>

        <!-- Detail Panel: Services Table -->
        <div class="detail-panel">

          <!-- No product selected -->
          <div class="empty-state small" id="stateNoProduct">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="40" height="40"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
            <p data-i18n="ccp-select-product">اختر صنفاً من القائمة</p>
          </div>

          <!-- Services table -->
          <div id="servicesPanel" style="display:none">
            <div class="detail-header">
              <h3 class="product-name" id="detailProductName"></h3>
            </div>
            <div class="table-wrap">
              <table class="services-table">
                <thead>
                  <tr>
                    <th data-i18n="ccp-service-col">الخدمة</th>
                    <th data-i18n="ccp-general-price">السعر العام</th>
                    <th data-i18n="ccp-custom-price">السعر الخاص</th>
                    <th data-i18n="ccp-difference">الفرق</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="servicesTbody">
                  <!-- Populated by JS -->
                </tbody>
              </table>
            </div>
          </div>

        </div>
      </div>

    </div>
  </div>

  <script src="../../assets/web-api.js"></script>
  <script src="../../assets/auth-guard.js"></script>
  <script src="../../assets/i18n.js"></script>
  <script src="customer-custom-prices.js"></script>
  <script src="../../assets/sidebar.js"></script>
</body>
</html>
