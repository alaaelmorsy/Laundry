<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>العمليات - نظام المغسلة</title>
  <link rel="stylesheet" href="../../assets/tailwind.css" />
  <link rel="stylesheet" href="services.css" />
  <link rel="stylesheet" href="../../assets/screen-mobile-compact.css" />
</head>
<body data-page-title="page-title-services">

  <div class="page-wrapper">

    <header class="header-bar" id="dragRegion">
      <div class="header-right">
        <div class="header-logo">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
              <path d="M4.93 4.93a10 10 0 0 0 0 14.14"/>
            </svg>
          </div>
          <span class="header-title" data-i18n="services-header-title">العمليات</span>
        </div>
      </div>
      <div class="header-left">
        <button class="back-btn" id="btnBack">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          <span data-i18n="services-back">العودة</span>
        </button>
      </div>
    </header>

    <main class="main-content">

      <div class="toolbar">
        <div class="search-wrap">
          <span class="search-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </span>
          <input id="searchInput" type="text" class="search-input"
            data-i18n-placeholder="services-search-placeholder"
            placeholder="بحث بالاسم..." autocomplete="off" />
        </div>

        <div class="toolbar-actions">
          <button id="btnAddService" class="btn-primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            <span data-i18n="services-btn-add">إضافة عملية</span>
          </button>
        </div>
      </div>

      <div class="table-container">
        <p class="table-scroll-hint" data-i18n="services-table-scroll-hint">← اسحب الجدول يميناً ويساراً لعرض كل الأعمدة →</p>
        <table class="services-table">
          <thead id="servicesTableHead">
            <tr>
              <th class="col-reorder th-nosort" scope="col" data-i18n-title="services-reorder-col-title" title="">⋮⋮</th>
              <th class="col-index" scope="col" data-i18n="services-col-index">#</th>
              <th class="th-sortable col-manual-order" scope="col">
                <button type="button" class="th-sort-btn" data-sort="sort_order">
                  <span class="th-sort-label" data-i18n="services-col-manual-order">الترتيب</span>
                  <span class="th-sort-icons" aria-hidden="true"><span class="sort-chevron sort-up">▲</span><span class="sort-chevron sort-down">▼</span></span>
                </button>
              </th>
              <th class="th-sortable" scope="col">
                <button type="button" class="th-sort-btn" data-sort="name_ar">
                  <span class="th-sort-label" data-i18n="services-col-name-ar">اسم العملية (عربي)</span>
                  <span class="th-sort-icons" aria-hidden="true"><span class="sort-chevron sort-up">▲</span><span class="sort-chevron sort-down">▼</span></span>
                </button>
              </th>
              <th class="th-sortable" scope="col">
                <button type="button" class="th-sort-btn" data-sort="name_en">
                  <span class="th-sort-label" data-i18n="services-col-name-en">اسم العملية (إنجليزي)</span>
                  <span class="th-sort-icons" aria-hidden="true"><span class="sort-chevron sort-up">▲</span><span class="sort-chevron sort-down">▼</span></span>
                </button>
              </th>
              <th class="th-sortable" scope="col">
                <button type="button" class="th-sort-btn" data-sort="is_active">
                  <span class="th-sort-label" data-i18n="services-col-status">الحالة</span>
                  <span class="th-sort-icons" aria-hidden="true"><span class="sort-chevron sort-up">▲</span><span class="sort-chevron sort-down">▼</span></span>
                </button>
              </th>
              <th class="th-actions" scope="col" data-i18n="services-col-actions">الإجراءات</th>
            </tr>
          </thead>
          <tbody id="servicesTableBody">
            <tr id="loadingRow">
              <td colspan="7" class="loading-cell">
                <div class="spinner"></div>
                <span data-i18n="services-loading">جارٍ التحميل...</span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div id="emptyState" class="empty-state" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M4.93 4.93a10 10 0 0 0 0 14.14"/>
        </svg>
        <p data-i18n="services-empty">لا توجد عمليات</p>
      </div>

      <div class="pagination-bar" id="paginationBar" style="display:none">
        <div class="pagination-info">
          <span id="paginationInfo"></span>
        </div>
        <div class="pagination-controls">
          <button id="btnFirstPage" class="page-btn" data-i18n-title="services-page-first">«</button>
          <button id="btnPrevPage"  class="page-btn" data-i18n-title="services-page-prev">‹</button>
          <div id="pageNumbers" class="page-numbers"></div>
          <button id="btnNextPage"  class="page-btn" data-i18n-title="services-page-next">›</button>
          <button id="btnLastPage"  class="page-btn" data-i18n-title="services-page-last">»</button>
        </div>
        <div class="page-size-selector">
          <span data-i18n="services-pagination-show">عرض</span>
          <select id="pageSizeSelect">
            <option value="25">25</option>
            <option value="50" selected>50</option>
            <option value="100">100</option>
            <option value="200">200</option>
          </select>
          <span data-i18n="services-pagination-per-page">في الصفحة</span>
        </div>
      </div>

    </main>

  </div>

  <div id="modalOverlay" class="modal-overlay" style="display:none">
    <div class="modal-box modal-wide services-modal-narrow">
      <div class="modal-header">
        <h2 id="modalTitle" class="modal-title" data-i18n="services-modal-add-title">إضافة عملية</h2>
        <button class="modal-close-btn" id="btnModalClose">✕</button>
      </div>

      <div id="modalError" class="error-msg" style="display:none"></div>

      <div class="modal-body">
        <input type="hidden" id="editServiceId" />

        <div class="form-grid services-form-single-col">

          <div class="field-group field-group-full">
            <label class="field-label">
              <span data-i18n="services-label-name-ar">اسم العملية بالعربية</span>
              <span class="required-star"> *</span>
            </label>
            <div class="field-wrap">
              <input id="inputNameAr" type="text" class="field-input"
                data-i18n-placeholder="services-placeholder-name-ar" autocomplete="off" />
            </div>
          </div>

          <div class="field-group field-group-full">
            <label class="field-label">
              <span data-i18n="services-label-name-en">اسم العملية بالإنجليزية</span>
              <span class="required-star"> *</span>
            </label>
            <div class="field-wrap-row">
              <div class="field-wrap" style="flex:1;min-width:0">
                <input id="inputNameEn" type="text" class="field-input"
                  data-i18n-placeholder="services-placeholder-name-en" autocomplete="off" />
              </div>
              <button type="button" id="btnTranslate" class="btn-auto-translate" title="ترجمة تلقائي من العربية">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M5 8l6 6"/>
                  <path d="M4 14s1-1 2-1 4 2 5 2 2-1 2-1"/>
                  <line x1="3" y1="6" x2="19" y2="6"/>
                  <line x1="10" y1="3" x2="10" y2="9"/>
                  <path d="M14 12l8 8"/>
                  <path d="M14 20h8v-8"/>
                </svg>
                <span class="btn-translate-label">ترجمة</span>
              </button>
            </div>
          </div>

        </div>
      </div>

      <div class="modal-footer">
        <button id="btnModalCancel" class="btn-cancel" data-i18n="services-btn-cancel">إلغاء</button>
        <button id="btnModalSave" class="btn-primary" data-i18n="services-btn-save">حفظ</button>
      </div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <div id="confirmOverlay" class="confirm-overlay" style="display:none">
    <div class="confirm-box">
      <div class="confirm-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </div>
      <h3 class="confirm-title" data-i18n="services-confirm-title">تأكيد الحذف</h3>
      <p class="confirm-msg" id="confirmMsg"></p>
      <div class="confirm-footer">
        <button id="btnConfirmCancel" class="btn-cancel" data-i18n="services-btn-cancel">إلغاء</button>
        <button id="btnConfirmOk" class="btn-danger" data-i18n="services-btn-delete-title">حذف</button>
      </div>
    </div>
  </div>

  <script src="../../assets/web-api.js"></script>
  <script src="../../assets/auth-guard.js"></script>
  <script src="../../assets/i18n.js"></script>
  <script src="services.js"></script>
</body>
</html>
