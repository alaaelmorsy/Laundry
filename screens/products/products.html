<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>الخدمات - نظام المغسلة</title>
  <link rel="stylesheet" href="../../assets/tailwind.css" />
  <link rel="stylesheet" href="products.css" />
  <link rel="stylesheet" href="../../assets/screen-mobile-compact.css" />
</head>
<body data-page-title="page-title-products">

  <div class="page-wrapper">

    <header class="header-bar" id="dragRegion">
      <div class="header-right">
        <div class="header-logo">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
              <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
              <line x1="12" y1="22.08" x2="12" y2="12"/>
            </svg>
          </div>
          <span class="header-title" data-i18n="products-header-title">الخدمات</span>
        </div>
      </div>
      <div class="header-left">
        <button class="back-btn" id="btnBack">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          <span data-i18n="products-back">العودة</span>
        </button>
      </div>
    </header>

    <main class="main-content">

      <div class="toolbar">
        <div class="search-wrap">
          <span class="search-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </span>
          <input id="searchInput" type="text" class="search-input"
            data-i18n-placeholder="products-search-placeholder"
            placeholder="بحث..." autocomplete="off" />
        </div>

        <div class="toolbar-actions">
          <button id="btnExportExcel" class="btn-export btn-excel" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
            <span data-i18n="products-export-excel">Excel</span>
          </button>
          <button id="btnExportPdf" class="btn-export btn-pdf" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
            <span data-i18n="products-export-pdf">PDF</span>
          </button>
          <button id="btnAddProduct" class="btn-primary" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            <span data-i18n="products-btn-add">إضافة منتج</span>
          </button>
        </div>
      </div>

      <div class="table-container">
        <p class="table-scroll-hint" data-i18n="products-table-scroll-hint">اسحب أفقياً لعرض كل أعمدة الجدول</p>
        <table class="products-table">
          <thead id="productsTableHead">
            <tr>
              <th class="col-reorder th-nosort" scope="col" data-i18n-title="products-reorder-col-title" title="">⋮⋮</th>
              <th class="col-index" scope="col" data-i18n="products-col-index">#</th>
              <th class="th-sortable col-manual-order" scope="col">
                <button type="button" class="th-sort-btn" data-sort="sort_order">
                  <span class="th-sort-label" data-i18n="products-col-manual-order">الترتيب</span>
                  <span class="th-sort-icons" aria-hidden="true"><span class="sort-chevron sort-up">▲</span><span class="sort-chevron sort-down">▼</span></span>
                </button>
              </th>
              <th class="col-thumb th-nosort" scope="col" data-i18n="products-col-image">الصورة</th>
              <th class="th-sortable" scope="col">
                <button type="button" class="th-sort-btn" data-sort="name_ar">
                  <span class="th-sort-label" data-i18n="products-col-name-ar">الاسم (عربي)</span>
                  <span class="th-sort-icons" aria-hidden="true"><span class="sort-chevron sort-up">▲</span><span class="sort-chevron sort-down">▼</span></span>
                </button>
              </th>
              <th class="th-sortable" scope="col">
                <button type="button" class="th-sort-btn" data-sort="name_en">
                  <span class="th-sort-label" data-i18n="products-col-name-en">الاسم (إنجليزي)</span>
                  <span class="th-sort-icons" aria-hidden="true"><span class="sort-chevron sort-up">▲</span><span class="sort-chevron sort-down">▼</span></span>
                </button>
              </th>
              <th class="th-sortable" scope="col">
                <button type="button" class="th-sort-btn" data-sort="lines">
                  <span class="th-sort-label" data-i18n="products-col-lines">أسطر التسعير</span>
                  <span class="th-sort-icons" aria-hidden="true"><span class="sort-chevron sort-up">▲</span><span class="sort-chevron sort-down">▼</span></span>
                </button>
              </th>
              <th class="th-sortable" scope="col">
                <button type="button" class="th-sort-btn" data-sort="is_active">
                  <span class="th-sort-label" data-i18n="products-col-status">الحالة</span>
                  <span class="th-sort-icons" aria-hidden="true"><span class="sort-chevron sort-up">▲</span><span class="sort-chevron sort-down">▼</span></span>
                </button>
              </th>
              <th class="th-sortable" scope="col">
                <button type="button" class="th-sort-btn" data-sort="created_at">
                  <span class="th-sort-label" data-i18n="products-col-created">تاريخ الإضافة</span>
                  <span class="th-sort-icons" aria-hidden="true"><span class="sort-chevron sort-up">▲</span><span class="sort-chevron sort-down">▼</span></span>
                </button>
              </th>
              <th class="th-actions th-nosort" scope="col" data-i18n="products-col-actions">الإجراءات</th>
            </tr>
          </thead>
          <tbody id="productsTableBody">
            <tr id="loadingRow">
              <td colspan="10" class="loading-cell">
                <div class="spinner"></div>
                <span data-i18n="products-loading">جارٍ التحميل...</span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div id="emptyState" class="empty-state" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
        </svg>
        <p data-i18n="products-empty">لا توجد منتجات</p>
      </div>

      <div class="pagination-bar" id="paginationBar" style="display:none">
        <div class="pagination-info">
          <span id="paginationInfo"></span>
        </div>
        <div class="pagination-controls">
          <button type="button" id="btnFirstPage" class="page-btn" data-i18n-title="products-page-first">«</button>
          <button type="button" id="btnPrevPage"  class="page-btn" data-i18n-title="products-page-prev">‹</button>
          <div id="pageNumbers" class="page-numbers"></div>
          <button type="button" id="btnNextPage"  class="page-btn" data-i18n-title="products-page-next">›</button>
          <button type="button" id="btnLastPage"  class="page-btn" data-i18n-title="products-page-last">»</button>
        </div>
        <div class="page-size-selector">
          <span data-i18n="products-pagination-show">عرض</span>
          <select id="pageSizeSelect">
            <option value="25">25</option>
            <option value="50" selected>50</option>
            <option value="100">100</option>
            <option value="200">200</option>
          </select>
          <span data-i18n="products-pagination-per-page">في الصفحة</span>
        </div>
      </div>

    </main>

  </div>

  <div id="modalOverlay" class="modal-overlay" style="display:none">
    <div class="modal-box modal-wide products-modal-xlarge">
      <div class="modal-header">
        <h2 id="modalTitle" class="modal-title" data-i18n="products-modal-add-title">إضافة منتج</h2>
        <button type="button" class="modal-close-btn" id="btnModalClose">✕</button>
      </div>

      <div id="modalError" class="error-msg" style="display:none"></div>

      <div class="modal-body">
        <input type="hidden" id="editProductId" />

        <div class="form-grid">
          <div class="field-group field-group-full">
            <div class="form-grid-names">
              <div class="field-group">
                <label class="field-label">
                  <span data-i18n="products-label-name-ar">الاسم بالعربية</span>
                  <span class="required-star"> *</span>
                </label>
                <div class="field-wrap">
                  <input id="inputNameAr" type="text" class="field-input"
                    data-i18n-placeholder="products-placeholder-name-ar" autocomplete="off" />
                </div>
              </div>
              <div class="field-group">
                <label class="field-label">
                  <span data-i18n="products-label-name-en">الاسم بالإنجليزية</span>
                  <span class="field-optional-hint" data-i18n="products-label-optional">(اختياري)</span>
                </label>
                <div class="field-wrap-row">
                  <div class="field-wrap" style="flex:1;min-width:0">
                    <input id="inputNameEn" type="text" class="field-input field-input-ltr"
                      data-i18n-placeholder="products-placeholder-name-en" autocomplete="off" />
                  </div>
                  <button type="button" id="btnTranslate" class="btn-auto-translate" title="ترجمة تلقائي من العربية">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M5 8l6 6"/>
                      <path d="M4 14s1-1 2-1 4 2 5 2 2-1 2-1"/>
                      <line x1="3" y1="6" x2="19" y2="6"/>
                      <line x1="10" y1="3" x2="10" y2="9"/>
                      <path d="M14 12l8 8"/>
                      <path d="M14 20h8v-8"/>
                    </svg>
                    <span class="btn-translate-label">ترجمة</span>
                  </button>
                </div>
              </div>
            </div>
          </div>

          <div class="field-group field-group-full">
            <div class="toggle-wrap">
              <label class="toggle-switch">
                <input type="checkbox" id="inputIsActive" checked />
                <span class="toggle-slider"></span>
              </label>
              <span class="toggle-label" data-i18n="products-label-active">المنتج نشط</span>
            </div>
          </div>

          <div class="field-group field-group-full">
            <div class="price-lines-section">
              <div class="price-lines-head">
                <span class="price-lines-title" data-i18n="products-price-lines-title">التسعير (عملية + سعر)</span>
                <button type="button" id="btnAddPriceLine" class="btn-secondary">
                  <span data-i18n="products-btn-add-line">+ سطر</span>
                </button>
              </div>
              <div class="price-lines-table-wrap">
                <table class="price-lines-table">
                  <thead>
                    <tr>
                      <th data-i18n="products-line-operation">العملية</th>
                      <th data-i18n="products-line-price">السعر</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody id="priceLinesBody"></tbody>
                </table>
              </div>
            </div>
          </div>

          <div class="field-group field-group-full">
            <label class="field-label" data-i18n="products-label-image">صورة المنتج</label>
            <p class="field-hint" data-i18n="products-image-hint">تُخزَّن مضغوطة في قاعدة البيانات — أي صيغة ملف.</p>
            <div class="image-picker-row">
              <div class="image-preview-wrap">
                <img id="imagePreview" class="product-thumb" style="display:none" alt="" />
                <div id="imagePlaceholder" class="product-thumb-placeholder" data-i18n="products-image-none">بدون صورة</div>
              </div>
              <div class="image-actions">
                <button type="button" id="btnPickImage" class="btn-secondary">
                  <span data-i18n="products-btn-pick-image">اختيار صورة</span>
                </button>
                <button type="button" id="btnRemoveImage" class="btn-secondary btn-text-danger" style="display:none">
                  <span data-i18n="products-btn-remove-image">إزالة الصورة</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" id="btnModalCancel" class="btn-cancel" data-i18n="products-btn-cancel">إلغاء</button>
        <button type="button" id="btnModalSave" class="btn-primary" data-i18n="products-btn-save">حفظ</button>
      </div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <div id="confirmOverlay" class="confirm-overlay" style="display:none">
    <div class="confirm-box">
      <div class="confirm-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </div>
      <h3 class="confirm-title" data-i18n="products-confirm-title">تأكيد الحذف</h3>
      <p class="confirm-msg" id="confirmMsg"></p>
      <div class="confirm-footer">
        <button type="button" id="btnConfirmCancel" class="btn-cancel" data-i18n="products-btn-cancel">إلغاء</button>
        <button type="button" id="btnConfirmOk" class="btn-danger" data-i18n="products-btn-delete">حذف</button>
      </div>
    </div>
  </div>

  <script src="../../assets/web-api.js"></script>
  <script src="../../assets/auth-guard.js"></script>
  <script src="../../assets/i18n.js"></script>
  <script src="products.js"></script>
</body>
</html>
