<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title data-i18n="page-title-roles">الصلاحيات - نظام المغسلة</title>
  <link rel="stylesheet" href="../../assets/tailwind.css" />
  <link rel="stylesheet" href="roles.css" />
  <link rel="stylesheet" href="../../assets/screen-mobile-compact.css" />
  <link rel="stylesheet" href="../../assets/sidebar.css" />
</head>
<body>
  <div class="page-wrapper">

    <header class="header-bar">
      <div class="header-right">
        <div class="header-logo">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
              <path d="M9 12l2 2 4-5"/>
            </svg>
          </div>
          <span class="header-title" data-i18n="roles-header-title">إدارة الصلاحيات</span>
        </div>
      </div>
      <div class="header-left">
        <button class="back-btn" id="btnBack">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          <span data-i18n="roles-back">العودة</span>
        </button>
      </div>
    </header>

    <main class="main-content">

      <!-- User selector -->
      <div class="user-selector-card">
        <label class="selector-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <span data-i18n="roles-selector-label">اختر مستخدماً لتعديل صلاحياته</span>
        </label>
        <div class="selector-wrap">
          <select id="userSelect" class="user-select">
            <option value="" data-i18n-text="roles-selector-placeholder">— اختر مستخدماً —</option>
          </select>
          <span class="selector-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </span>
        </div>
      </div>

      <!-- Permissions panel (hidden until user selected) -->
      <div id="permissionsPanel" style="display:none">

        <!-- User info bar -->
        <div class="user-info-bar" id="userInfoBar"></div>

        <!-- Admin notice -->
        <div id="adminNotice" class="admin-notice" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2 19 6v6c0 5-3 9-7 10C8 21 5 17 5 12V6l7-4z"/>
            <path d="M9 12l2 2 4-5"/>
          </svg>
          <span data-i18n="roles-admin-notice">هذا المستخدم مدير — يملك جميع الصلاحيات تلقائياً ولا يمكن تقييده</span>
        </div>

        <!-- Error -->
        <div id="permError" class="error-msg" style="display:none"></div>

        <!-- Permissions grid -->
        <div id="permissionsGrid" class="permissions-grid">

          <!-- Group: المبيعات -->
          <div class="perm-group perm-group--sales">
            <div class="perm-group-header">
              <div class="perm-group-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="2" y="3" width="20" height="14" rx="2"/>
                  <path d="M8 21h8M12 17v4"/>
                </svg>
              </div>
              <span data-i18n="roles-group-sales">المبيعات</span>
              <button class="btn-group-toggle" data-group="sales" type="button" data-i18n="roles-toggle-select-all">تحديد الكل</button>
            </div>
            <div class="perm-items" data-group-items="sales">
              <label class="perm-item">
                <span class="perm-check"><input type="checkbox" data-perm="pos" /></span>
                <span data-i18n="roles-perm-pos">نقطة البيع</span>
              </label>
              <label class="perm-item">
                <span class="perm-check"><input type="checkbox" data-perm="pos_discount" /></span>
                <span data-i18n="roles-perm-pos-discount">الخصم في نقطة البيع</span>
              </label>
              <label class="perm-item">
                <span class="perm-check"><input type="checkbox" data-perm="pos_extra" /></span>
                <span data-i18n="roles-perm-pos-extra">الإضافي في نقطة البيع</span>
              </label>
              <label class="perm-item">
                <span class="perm-check"><input type="checkbox" data-perm="pos_process_invoice" /></span>
                <span data-i18n="roles-perm-pos-process-invoice">معالجة الفاتورة</span>
              </label>
              <label class="perm-item">
                <span class="perm-check"><input type="checkbox" data-perm="pos_refund_receipt" /></span>
                <span data-i18n="roles-perm-pos-refund-receipt">مرتجع إيصال اشتراك</span>
              </label>
              <label class="perm-item">
                <span class="perm-check"><input type="checkbox" data-perm="invoices" /></span>
                <span data-i18n="roles-perm-invoices">الفواتير</span>
              </label>
              <label class="perm-item">
                <span class="perm-check"><input type="checkbox" data-perm="credit_invoices" /></span>
                <span data-i18n="roles-perm-credit-invoices">الفواتير الدائنة</span>
              </label>
              <label class="perm-item">
                <span class="perm-check"><input type="checkbox" data-perm="consumption_receipts" /></span>
                <span data-i18n="roles-perm-consumption-receipts">إيصالات الاستهلاك</span>
              </label>
              <label class="perm-item">
                <span class="perm-check"><input type="checkbox" data-perm="payment" /></span>
                <span data-i18n="roles-perm-payment">سداد الآجل</span>
              </label>
              <label class="perm-item">
                <span class="perm-check"><input type="checkbox" data-perm="hotels_companies" /></span>
                <span data-i18n="roles-perm-hotels-companies">الفنادق والشركات</span>
              </label>
            </div>
          </div>

          <!-- Group: العملاء والمنتجات -->
          <div class="perm-group perm-group--customers">
            <div class="perm-group-header">
              <div class="perm-group-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                  <circle cx="12" cy="7" r="4"/>
                </svg>
              </div>
              <span data-i18n="roles-group-customers">العملاء والمنتجات</span>
              <button class="btn-group-toggle" data-group="customers" type="button" data-i18n="roles-toggle-select-all">تحديد الكل</button>
            </div>
            <div class="perm-items" data-group-items="customers">
              <label class="perm-item">
                <span class="perm-check"><input type="checkbox" data-perm="customers" /></span>
                <span data-i18n="roles-perm-customers">العملاء</span>
              </label>
              <label class="perm-item">
                <span class="perm-check"><input type="checkbox" data-perm="products" /></span>
                <span data-i18n="roles-perm-products">الخدمات والمنتجات</span>
              </label>
              <label class="perm-item">
                <span class="perm-check"><input type="checkbox" data-perm="services" /></span>
                <span data-i18n="roles-perm-services">العمليات</span>
              </label>
              <label class="perm-item">
                <span class="perm-check"><input type="checkbox" data-perm="hangers" /></span>
                <span data-i18n="roles-perm-hangers">سير الملابس</span>
              </label>
              <label class="perm-item">
                <span class="perm-check"><input type="checkbox" data-perm="subscriptions" /></span>
                <span data-i18n="roles-perm-subscriptions">الاشتراكات المسبقة</span>
              </label>
              <label class="perm-item">
                <span class="perm-check"><input type="checkbox" data-perm="customer_custom_prices" /></span>
                <span data-i18n="roles-perm-customer-custom-prices">الأسعار المخصصة</span>
              </label>
            </div>
          </div>

          <!-- Group: الإدارة -->
          <div class="perm-group perm-group--admin">
            <div class="perm-group-header">
              <div class="perm-group-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="3"/>
                  <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
              </div>
              <span data-i18n="roles-group-admin">الإدارة</span>
              <button class="btn-group-toggle" data-group="admin-g" type="button" data-i18n="roles-toggle-select-all">تحديد الكل</button>
            </div>
            <div class="perm-items" data-group-items="admin-g">
              <label class="perm-item">
                <span class="perm-check"><input type="checkbox" data-perm="expenses" /></span>
                <span data-i18n="roles-perm-expenses">المصروفات</span>
              </label>
              <label class="perm-item">
                <span class="perm-check"><input type="checkbox" data-perm="offers" /></span>
                <span data-i18n="roles-perm-offers">العروض</span>
              </label>
              <label class="perm-item">
                <span class="perm-check"><input type="checkbox" data-perm="users" /></span>
                <span data-i18n="roles-perm-users">المستخدمون</span>
              </label>
              <label class="perm-item">
                <span class="perm-check"><input type="checkbox" data-perm="roles" /></span>
                <span data-i18n="roles-perm-roles">الصلاحيات</span>
              </label>
              <label class="perm-item">
                <span class="perm-check"><input type="checkbox" data-perm="settings" /></span>
                <span data-i18n="roles-perm-settings">الإعدادات</span>
              </label>
              <label class="perm-item">
                <span class="perm-check"><input type="checkbox" data-perm="whatsapp" /></span>
                <span data-i18n="roles-perm-whatsapp">WhatsApp</span>
              </label>
              <label class="perm-item">
                <span class="perm-check"><input type="checkbox" data-perm="zatca_settings" /></span>
                <span data-i18n="roles-perm-zatca">ZATCA</span>
              </label>
            </div>
          </div>

          <!-- Group: التقارير -->
          <div class="perm-group perm-group--reports">
            <div class="perm-group-header">
              <div class="perm-group-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="18" y1="20" x2="18" y2="10"/>
                  <line x1="12" y1="20" x2="12" y2="4"/>
                  <line x1="6" y1="20" x2="6" y2="14"/>
                </svg>
              </div>
              <span data-i18n="roles-group-reports">التقارير</span>
              <button class="btn-group-toggle" data-group="reports" type="button" data-i18n="roles-toggle-select-all">تحديد الكل</button>
            </div>
            <div class="perm-items" data-group-items="reports">
              <label class="perm-item">
                <span class="perm-check"><input type="checkbox" data-perm="report_daily" /></span>
                <span data-i18n="roles-perm-report-daily">التقرير اليومي</span>
              </label>
              <label class="perm-item">
                <span class="perm-check"><input type="checkbox" data-perm="report_period" /></span>
                <span data-i18n="roles-perm-report-period">تقرير الفترة</span>
              </label>
              <label class="perm-item">
                <span class="perm-check"><input type="checkbox" data-perm="report_expenses" /></span>
                <span data-i18n="roles-perm-report-expenses">تقرير المصروفات</span>
              </label>
              <label class="perm-item">
                <span class="perm-check"><input type="checkbox" data-perm="report_credit_invoices" /></span>
                <span data-i18n="roles-perm-report-credit-invoices">تقرير الفواتير الدائنة</span>
              </label>
              <label class="perm-item">
                <span class="perm-check"><input type="checkbox" data-perm="report_all_invoices" /></span>
                <span data-i18n="roles-perm-report-all-invoices">تقرير جميع الفواتير</span>
              </label>
              <label class="perm-item">
                <span class="perm-check"><input type="checkbox" data-perm="report_subscriptions" /></span>
                <span data-i18n="roles-perm-report-subscriptions">تقرير الاشتراكات</span>
              </label>
              <label class="perm-item">
                <span class="perm-check"><input type="checkbox" data-perm="report_types" /></span>
                <span data-i18n="roles-perm-report-types">تقرير الأنواع</span>
              </label>
              <label class="perm-item">
                <span class="perm-check"><input type="checkbox" data-perm="report_worker" /></span>
                <span data-i18n="roles-perm-report-worker">تقرير العمال</span>
              </label>
              <label class="perm-item">
                <span class="perm-check"><input type="checkbox" data-perm="report_customer_account" /></span>
                <span data-i18n="roles-perm-report-customer-account">كشف حساب العميل</span>
              </label>
              <label class="perm-item">
                <span class="perm-check"><input type="checkbox" data-perm="report_hotels_companies" /></span>
                <span data-i18n="roles-perm-report-hotels-companies">تقرير الفنادق والشركات</span>
              </label>
              <label class="perm-item">
                <span class="perm-check"><input type="checkbox" data-perm="report_zakat" /></span>
                <span data-i18n="roles-perm-report-zakat">تقرير الزكاة</span>
              </label>
            </div>
          </div>

        </div>

        <!-- Save button -->
        <div class="save-bar">
          <button id="btnSave" class="btn-save">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            <span data-i18n="roles-save-btn">حفظ الصلاحيات</span>
          </button>
        </div>

      </div>

      <!-- Empty state -->
      <div id="emptyState" class="empty-state">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <p data-i18n="roles-empty-state">اختر مستخدماً من القائمة لإدارة صلاحياته</p>
      </div>

    </main>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script src="../../assets/web-api.js"></script>
  <script src="../../assets/auth-guard.js"></script>
  <script src="../../assets/i18n.js"></script>
  <script src="roles.js"></script>
  <script src="../../assets/sidebar.js"></script>
</body>
</html>
