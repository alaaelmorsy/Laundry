<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>المستخدمون - نظام المغسلة</title>
  <link rel="stylesheet" href="../../assets/tailwind.css" />
  <link rel="stylesheet" href="users.css" />
  <link rel="stylesheet" href="../../assets/screen-mobile-compact.css" />
</head>
<body data-page-title="page-title-users">

  <div class="page-wrapper">

    <header class="header-bar" id="dragRegion">
      <div class="header-right">
        <div class="header-logo">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
          </div>
          <span class="header-title" data-i18n="users-header-title">إدارة المستخدمين</span>
        </div>
      </div>
      <div class="header-left">
        <button class="back-btn" id="btnBack">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          <span data-i18n="users-back">العودة</span>
        </button>
      </div>
    </header>

    <main class="main-content">

      <div class="toolbar">
        <div class="search-wrap">
          <span class="search-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </span>
          <input id="searchInput" type="text" class="search-input" name="user-list-filter" inputmode="search" enterkeyhint="search" data-i18n-placeholder="users-search-placeholder" placeholder="بحث بالاسم أو اسم المستخدم..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" data-lpignore="true" />
        </div>
        <button id="btnAddUser" class="btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          <span data-i18n="users-btn-add">إضافة مستخدم</span>
        </button>
      </div>

      <div class="table-container">
        <table class="users-table">
          <thead>
            <tr>
              <th>#</th>
              <th data-i18n="users-col-fullname">الاسم الكامل</th>
              <th data-i18n="users-col-username">اسم المستخدم</th>
              <th data-i18n="users-col-role">الدور</th>
              <th data-i18n="users-col-status">الحالة</th>
              <th data-i18n="users-col-actions">الإجراءات</th>
            </tr>
          </thead>
          <tbody id="usersTableBody">
            <tr id="loadingRow">
              <td colspan="6" class="loading-cell">
                <div class="spinner"></div>
                <span data-i18n="users-loading">جارٍ التحميل...</span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div id="emptyState" class="empty-state" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <p data-i18n="users-empty">لا يوجد مستخدمون</p>
      </div>

    </main>

  </div>

  <div id="modalOverlay" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modalTitle" class="modal-title">إضافة مستخدم جديد</h2>
        <button class="modal-close-btn" id="btnModalClose">✕</button>
      </div>

      <div id="modalError" class="error-msg" style="display:none"></div>

      <div class="modal-body">
        <input type="hidden" id="editUserId" />

        <div class="field-group">
          <label class="field-label" data-i18n="users-label-fullname">الاسم الكامل</label>
          <div class="field-wrap">
            <input id="inputFullName" type="text" class="field-input" data-i18n-placeholder="users-placeholder-fullname" placeholder="أدخل الاسم الكامل" autocomplete="off" />
            <span class="field-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
          </div>
        </div>

        <div class="field-group">
          <label class="field-label" data-i18n="users-label-username">اسم المستخدم</label>
          <div class="field-wrap">
            <input id="inputUsername" type="text" class="field-input" data-i18n-placeholder="users-placeholder-username" placeholder="أدخل اسم المستخدم" autocomplete="off" />
            <span class="field-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
          </div>
        </div>

        <div class="field-group">
          <label class="field-label" id="passwordLabel" data-i18n="users-label-password">كلمة المرور</label>
          <div class="field-wrap">
            <input id="inputPassword" type="password" class="field-input" data-i18n-placeholder="users-placeholder-password" placeholder="أدخل كلمة المرور" autocomplete="off" />
            <button id="toggleModalPassword" class="toggle-pass-btn" type="button" tabindex="-1">
              <svg id="modalEyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg id="modalEyeOffIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="field-group">
          <label class="field-label" data-i18n="users-label-role">الدور</label>
          <div class="select-wrap">
            <select id="inputRole" class="field-select">
              <option value="admin" data-i18n="users-role-admin">مدير</option>
              <option value="cashier" data-i18n="users-role-cashier">كاشير</option>
            </select>
            <span class="select-arrow">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </span>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button id="btnModalCancel" class="btn-cancel" data-i18n="users-btn-cancel">إلغاء</button>
        <button id="btnModalSave" class="btn-primary" data-i18n="users-btn-save">حفظ</button>
      </div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <div id="confirmOverlay" class="confirm-overlay" style="display:none">
    <div class="confirm-box">
      <div class="confirm-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </div>
      <h3 class="confirm-title" id="confirmTitle" data-i18n="users-confirm-title">تأكيد الحذف</h3>
      <p class="confirm-msg" id="confirmMsg"></p>
      <div class="confirm-footer">
        <button id="btnConfirmCancel" class="btn-cancel" data-i18n="users-btn-cancel">إلغاء</button>
        <button id="btnConfirmOk" class="btn-danger" data-i18n="users-btn-delete">حذف</button>
      </div>
    </div>
  </div>

  <script src="../../assets/web-api.js"></script>
  <script src="../../assets/auth-guard.js"></script>
  <script src="../../assets/i18n.js"></script>
  <script src="users.js"></script>
</body>
</html>
