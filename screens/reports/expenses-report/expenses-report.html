<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title data-i18n="page-title-expenses-report">تقرير المصروفات - نظام المغسلة</title>
  <link rel="stylesheet" href="../../../assets/tailwind.css" />
  <link rel="stylesheet" href="expenses-report.css" />
  <link rel="stylesheet" href="../../../assets/screen-mobile-compact.css" />
</head>
<body data-page-title="page-title-expenses-report">

  <div class="page-wrapper">

    <header class="header-bar" id="dragRegion">
      <div class="header-right">
        <div class="header-logo">
          <div class="logo-icon" style="background:linear-gradient(135deg,#f43f5e,#e11d48)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="1" x2="12" y2="23"/>
              <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
            </svg>
          </div>
          <span class="header-title" data-i18n="expenses-report-header">تقرير المصروفات</span>
        </div>
      </div>
      <div class="header-left">
        <button class="btn-action btn-excel" id="btnExcelExport" data-i18n-title="expenses-report-export-excel" title="تصدير Excel">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          <span class="btn-label" data-i18n="expenses-report-export-excel">Excel</span>
        </button>
        <button class="btn-action btn-pdf" id="btnPdfExport" data-i18n-title="expenses-report-export-pdf" title="تصدير PDF">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="9" y1="15" x2="15" y2="15"/>
          </svg>
          <span class="btn-label" data-i18n="expenses-report-export-pdf">PDF</span>
        </button>
        <button class="back-btn" id="btnBack">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          <span data-i18n="reports-back">العودة</span>
        </button>
      </div>
    </header>

    <div class="filter-bar no-print">
      <div class="filter-inner">
        <div class="filter-fields">
          <div class="date-pair-wrap">
            <label class="filter-field">
              <span class="filter-label" data-i18n="expenses-report-from">من:</span>
              <input type="datetime-local" id="filterDateFrom" class="filter-input" />
            </label>
            <label class="filter-field">
              <span class="filter-label" data-i18n="expenses-report-to">إلى:</span>
              <input type="datetime-local" id="filterDateTo" class="filter-input" />
            </label>
          </div>
        </div>
        <button id="btnApplyFilter" class="btn-apply">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <span data-i18n="expenses-report-show">عرض التقرير</span>
        </button>
      </div>
    </div>

    <main class="main-content" id="mainContent">

      <div id="emptyPrompt" class="empty-prompt">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="4" width="18" height="16" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
          <path d="M8 14h8M8 18h5"/>
        </svg>
        <p data-i18n="expenses-report-empty">اختر الفترة الزمنية واضغط "عرض التقرير"</p>
      </div>

      <div id="loadingState" class="loading-state" style="display:none">
        <div class="spinner"></div>
        <p data-i18n="expenses-report-loading">جارٍ تحميل التقرير...</p>
      </div>

      <div id="reportContent" style="display:none">

        <div class="print-header">
          <div class="print-title" data-i18n="expenses-report-header">تقرير المصروفات</div>
          <div class="print-meta" id="printMeta"></div>
        </div>

        <div class="period-info-bar" id="periodInfoBar"></div>

        <!-- Summary Cards -->
        <div class="report-section">
          <div class="section-header">
            <h2 class="section-title" data-i18n="expenses-report-summary">الملخص</h2>
          </div>
          <div class="pay-grid" id="summaryGrid">
            <div class="pay-card-item" style="border-right-color:#6366f1">
              <div class="pay-card-icon" style="color:#6366f1">📊</div>
              <div class="pay-card-info">
                <div class="pay-card-label" data-i18n="expenses-summary-total-before">إجمالي المصروفات (قبل الضريبة)</div>
                <div class="pay-card-count" id="summaryCount">0 سجل</div>
              </div>
              <div class="pay-card-amounts">
                <div class="pay-card-main" id="summaryTotalBefore">0.00 <span class="sar">&#xE900;</span></div>
              </div>
            </div>
            <div class="pay-card-item" style="border-right-color:#f59e0b">
              <div class="pay-card-icon" style="color:#f59e0b">📋</div>
              <div class="pay-card-info">
                <div class="pay-card-label" data-i18n="expenses-summary-tax">إجمالي الضريبة (15%)</div>
                <div class="pay-card-count"></div>
              </div>
              <div class="pay-card-amounts">
                <div class="pay-card-main" id="summaryTax">0.00 <span class="sar">&#xE900;</span></div>
              </div>
            </div>
            <div class="pay-card-item" style="border-right-color:#10b981">
              <div class="pay-card-icon" style="color:#10b981">✅</div>
              <div class="pay-card-info">
                <div class="pay-card-label" data-i18n="expenses-summary-grand-total">الإجمالي الكلي</div>
                <div class="pay-card-count"></div>
              </div>
              <div class="pay-card-amounts">
                <div class="pay-card-main" id="summaryGrandTotal">0.00 <span class="sar">&#xE900;</span></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Expenses Table Section -->
        <div class="report-section">
          <div class="section-header">
            <h2 class="section-title" data-i18n="expenses-report-details">تفاصيل المصروفات</h2>
            <span class="section-badge" id="badgeExpenses">0</span>
          </div>
          <div class="table-container">
            <table class="report-table detail-table">
              <thead>
                <tr>
                  <th class="center" style="width:40px">#</th>
                  <th data-i18n="expenses-col-title">العنوان</th>
                  <th data-i18n="expenses-col-category">الفئة</th>
                  <th class="center" data-i18n="expenses-col-date">التاريخ</th>
                  <th class="center" data-i18n="expenses-col-amount">المبلغ</th>
                  <th class="center" data-i18n="expenses-col-taxable">ضريبة؟</th>
                  <th class="center" data-i18n="expenses-col-tax">الضريبة</th>
                  <th class="center" data-i18n="expenses-col-total">الإجمالي</th>
                  <th data-i18n="expenses-col-notes">ملاحظات</th>
                </tr>
              </thead>
              <tbody id="expensesTableBody"></tbody>
            </table>
          </div>
          <div class="section-footer" id="expensesFooter"></div>
        </div>

      </div>

    </main>

  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script src="../../../assets/web-api.js"></script>
  <script src="../../../assets/auth-guard.js"></script>
  <script src="../../../assets/i18n.js"></script>
  <script src="expenses-report.js"></script>
</body>
</html>
