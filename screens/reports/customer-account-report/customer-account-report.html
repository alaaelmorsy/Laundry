<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title data-i18n="page-title-customer-account-report">كشف حساب العميل - نظام المغسلة</title>
  <link rel="stylesheet" href="../../../assets/tailwind.css" />
  <link rel="stylesheet" href="customer-account-report.css" />
  <link rel="stylesheet" href="../../../assets/screen-mobile-compact.css" />
</head>
<body data-page-title="page-title-customer-account-report">

  <div class="page-wrapper">

    <header class="header-bar" id="dragRegion">
      <div class="header-right">
        <div class="header-logo">
          <div class="logo-icon" style="background:linear-gradient(135deg,#f97316,#c2410c)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
              <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
            </svg>
          </div>
          <span class="header-title" data-i18n="customer-account-report-header">كشف حساب العميل</span>
        </div>
      </div>
      <div class="header-left">
        <button class="btn-action btn-excel" id="btnExcelExport" style="display:none" title="تصدير Excel">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          <span class="btn-label" data-i18n="customer-account-export-excel">Excel</span>
        </button>
        <button class="btn-action btn-pdf" id="btnPdfExport" style="display:none" title="طباعة PDF">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="9" y1="15" x2="15" y2="15"/>
          </svg>
          <span class="btn-label" data-i18n="customer-account-export-pdf">PDF</span>
        </button>
        <button class="back-btn" id="btnBack">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          <span data-i18n="reports-back">العودة</span>
        </button>
      </div>
    </header>

    <div class="filter-bar no-print">
      <div class="filter-inner">
        <div class="filter-fields">

          <!-- Customer search -->
          <div class="customer-search-wrap">
            <label class="filter-field customer-field">
              <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
              <input type="text" id="customerSearch" class="filter-input" autocomplete="off"
                     data-i18n-placeholder="customer-account-search-placeholder" placeholder="ابحث باسم العميل أو رقم الجوال..." />
            </label>
            <div id="customerDropdown" class="customer-dropdown" style="display:none"></div>
          </div>

          <!-- Date range -->
          <div class="date-pair-wrap">
            <label class="filter-field">
              <span class="filter-label" data-i18n="customer-account-from">من:</span>
              <input type="datetime-local" id="filterDateFrom" class="filter-input date-input" />
            </label>
            <label class="filter-field">
              <span class="filter-label" data-i18n="customer-account-to">إلى:</span>
              <input type="datetime-local" id="filterDateTo" class="filter-input date-input" />
            </label>
          </div>

          <!-- Movement type filter -->
          <label class="filter-field" id="typeFilterWrap" style="display:none">
            <span class="filter-label">النوع:</span>
            <select id="filterMovementType" class="filter-input filter-select">
              <option value="all">الكل</option>
              <option value="paid_invoice">فاتورة مدفوعة</option>
              <option value="deferred_invoice">فاتورة آجلة</option>
              <option value="deferred_payment">سداد آجل</option>
              <option value="subscription">اشتراك</option>
              <option value="consumption">إيصال استهلاك</option>
              <option value="consumption_refund">مرتجع إيصال</option>
              <option value="credit_note">فاتورة دائنة</option>
            </select>
          </label>

          <!-- Status filters -->
          <label class="filter-field" id="filterPaidWrap" style="display:none">
            <span class="filter-label">الدفع:</span>
            <select id="filterPaid" class="filter-input filter-select">
              <option value="all">الكل</option>
              <option value="yes">تم الدفع</option>
              <option value="no">لم يُدفع</option>
            </select>
          </label>
          <label class="filter-field" id="filterCleaningWrap" style="display:none">
            <span class="filter-label">التنظيف:</span>
            <select id="filterCleaning" class="filter-input filter-select">
              <option value="all">الكل</option>
              <option value="yes">تم التنظيف</option>
              <option value="no">لم يُنظَّف</option>
            </select>
          </label>
          <label class="filter-field" id="filterDeliveryWrap" style="display:none">
            <span class="filter-label">التسليم:</span>
            <select id="filterDelivery" class="filter-input filter-select">
              <option value="all">الكل</option>
              <option value="yes">تم التسليم</option>
              <option value="no">لم يُسلَّم</option>
            </select>
          </label>
        </div>

        <button id="btnApplyFilter" class="btn-apply">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <span data-i18n="customer-account-show">عرض الكشف</span>
        </button>
      </div>
    </div>

    <main class="main-content" id="mainContent">

      <div id="emptyPrompt" class="empty-prompt">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
          <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
        </svg>
        <p id="emptyMessage" data-i18n="customer-account-empty">ابحث عن عميل ثم اضغط "عرض الكشف"</p>
      </div>

      <div id="loadingState" class="loading-state" style="display:none">
        <div class="spinner"></div>
        <p data-i18n="customer-account-loading">جارٍ تحميل كشف الحساب...</p>
      </div>

      <div id="reportContent" style="display:none">

        <!-- Print header (visible in PDF/print only) -->
        <div class="print-header">
          <div id="printCompanyHeader"></div>
          <div class="print-title" data-i18n="customer-account-report-header">كشف حساب العميل</div>
          <div class="print-meta" id="printMeta"></div>
        </div>

        <!-- Customer info bar -->
        <div class="customer-info-bar" id="customerInfoBar"></div>

        <!-- Summary cards -->
        <div class="report-section">
          <div class="section-header">
            <h2 class="section-title" data-i18n="customer-account-summary">ملخص الحساب</h2>
          </div>
          <div class="summary-grid" id="summaryGrid"></div>
        </div>

        <!-- Subscription summary (shown only if customer has subscriptions) -->
        <div class="report-section" id="subscriptionSection" style="display:none">
          <div class="section-header">
            <h2 class="section-title" data-i18n="customer-account-subscription-summary">ملخص الاشتراك</h2>
          </div>
          <div class="table-container">
            <table class="report-table sub-table">
              <thead>
                <tr>
                  <th data-i18n="customer-account-sub-status">الحالة</th>
                  <th data-i18n="customer-account-sub-from">من</th>
                  <th data-i18n="customer-account-sub-to">إلى</th>
                  <th class="num-th" data-i18n="customer-account-sub-value">القيمة الإجمالية</th>
                  <th class="num-th" data-i18n="customer-account-sub-consumed">إجمالي الاستهلاك</th>
                  <th class="num-th" data-i18n="customer-account-sub-remaining">الرصيد المتبقي</th>
                </tr>
              </thead>
              <tbody id="subscriptionTableBody"></tbody>
            </table>
          </div>
        </div>

        <!-- Movements table -->
        <div class="report-section">
          <div class="section-header">
            <h2 class="section-title" data-i18n="customer-account-movements">الحركات التفصيلية</h2>
            <span class="section-badge" id="movementsBadge">0</span>
          </div>
          <div class="table-container">
            <table class="report-table movements-table">
              <thead>
                <tr>
                  <th data-i18n="customer-account-col-date">التاريخ</th>
                  <th data-i18n="customer-account-col-type">النوع</th>
                  <th data-i18n="customer-account-col-desc">الوصف</th>
                  <th class="num-th" data-i18n="customer-account-col-debit">مدين</th>
                  <th class="num-th" data-i18n="customer-account-col-credit">دائن</th>
                  <th class="num-th" data-i18n="customer-account-col-balance">الرصيد</th>
                  <th class="status-th">تم الدفع</th>
                  <th class="status-th">التنظيف</th>
                  <th class="status-th">التسليم</th>
                  <th class="view-th">عرض</th>
                </tr>
              </thead>
              <tbody id="movementsTableBody"></tbody>
            </table>
          </div>
          <div class="section-footer" id="movementsFooter"></div>
        </div>

      </div>

    </main>

  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script src="../../../assets/web-api.js"></script>
  <script src="../../../assets/auth-guard.js"></script>
  <script src="../../../assets/i18n.js"></script>
  <script src="customer-account-report.js"></script>
</body>
</html>
