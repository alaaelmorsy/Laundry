name: Build & Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Read version from package.json ────────────────────────────────────
      - name: Read version
        id: version
        shell: pwsh
        run: |
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $v = $pkg.version
          echo "version=$v" >> $env:GITHUB_OUTPUT
          echo "tag=v$v" >> $env:GITHUB_OUTPUT
          echo "Version: $v"

      # ── 3. Check if release already exists ───────────────────────────────────
      - name: Check existing release
        id: check
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "v${{ steps.version.outputs.version }}"
          gh release view $tag 2>&1 | Out-Null
          if ($LASTEXITCODE -eq 0) {
            echo "exists=true" >> $env:GITHUB_OUTPUT
            echo "Release $tag already exists — skipping."
          } else {
            echo "exists=false" >> $env:GITHUB_OUTPUT
            echo "Release $tag does not exist — will create."
          }
          exit 0

      # ── 4. Setup Node.js ─────────────────────────────────────────────────────
      - name: Setup Node.js
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 5. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        if: steps.check.outputs.exists == 'false'
        shell: pwsh
        run: npm ci --ignore-scripts

      # ── 6. Build exe with pkg → release\laundry-app.exe ─────────────────────
      - name: Build exe
        if: steps.check.outputs.exists == 'false'
        shell: pwsh
        run: |
          npx pkg . --compress GZip --output "release\laundry-app.exe"
          echo "exe size: $([Math]::Round((Get-Item 'release\laundry-app.exe').Length / 1MB, 1)) MB"

      # ── 7. Prepare release folder assets ─────────────────────────────────────
      - name: Prepare release assets
        if: steps.check.outputs.exists == 'false'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          $mkcertUrl = "https://github.com/FiloSottile/mkcert/releases/download/v1.4.4/mkcert-v1.4.4-windows-amd64.exe"
          Invoke-WebRequest -Uri $mkcertUrl -OutFile release\mkcert.exe -UseBasicParsing
          echo "mkcert: $([Math]::Round((Get-Item 'release\mkcert.exe').Length / 1KB, 0)) KB"

      # ── 7b. Create default installer .env ────────────────────────────────────
      - name: Create installer env file
        if: steps.check.outputs.exists == 'false'
        shell: pwsh
        run: |
          $lines = @(
            "PORT=3000",
            "DB_HOST=127.0.0.1",
            "DB_USER=root",
            "DB_PASSWORD=Db2@dm1n2022",
            "DB_PORT=3306",
            "DB_NAME=laundry_db"
          )
          $lines -join "`n" | Set-Content -Path installer\.env -Encoding utf8

      # ── 8. Install Inno Setup ─────────────────────────────────────────────────
      - name: Install Inno Setup
        if: steps.check.outputs.exists == 'false'
        shell: pwsh
        run: choco install innosetup --no-progress -y

      # ── 8. Build installer ────────────────────────────────────────────────────
      - name: Build installer
        if: steps.check.outputs.exists == 'false'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc "/DAppVersion=$version" "installer\laundry.iss"
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup build failed" }
          $size = [Math]::Round((Get-Item "dist\PLUS-Laundry-Setup.exe").Length / 1MB, 1)
          echo "Installer size: $size MB"

      # ── 9. Create source ZIP for auto-update ─────────────────────────────────
      - name: Create source ZIP
        if: steps.check.outputs.exists == 'false'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $zipName = "laundry-v$version.zip"

          $exclude = @('node_modules', 'data', '.env', 'ssl', 'backup', '.git',
                       '.specify', 'specs', 'dist', 'release', '.github', '.kilo')

          $items = Get-ChildItem -Path . -Force |
            Where-Object { $exclude -notcontains $_.Name -and $_.Name -ne '.env' }

          Compress-Archive -Path ($items | Select-Object -ExpandProperty FullName) `
                           -DestinationPath $zipName -Force

          echo "ZIP size: $([Math]::Round((Get-Item $zipName).Length / 1MB, 1)) MB"

      # ── 10. Generate SHA256 checksums ─────────────────────────────────────────
      - name: Generate checksums
        if: steps.check.outputs.exists == 'false'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $zipName = "laundry-v$version.zip"
          $setupName = "dist\Laundry-PLUS-Setup-v$version.exe"

          $zipHash   = (Get-FileHash $zipName   -Algorithm SHA256).Hash.ToLower()
          $setupHash = (Get-FileHash $setupName -Algorithm SHA256).Hash.ToLower()

          "$zipHash    $zipName"                          | Out-File -FilePath sha256sums.txt -Encoding utf8
          "$setupHash  Laundry-PLUS-Setup-v$version.exe" | Add-Content -Path sha256sums.txt -Encoding utf8

          Get-Content sha256sums.txt

      # ── 11. Create GitHub Release and upload assets ───────────────────────────
      - name: Create Release
        if: steps.check.outputs.exists == 'false'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tag = "v$version"
          $zipName = "laundry-v$version.zip"

          gh release create $tag `
            --title "الإصدار $tag" `
            --notes "إصدار $tag — تحديث تلقائي" `
            $zipName `
            sha256sums.txt `
            "dist\Laundry-PLUS-Setup-v$version.exe"

          echo "Release $tag created successfully."
